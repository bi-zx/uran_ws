network:
  device_id: "device_001"        # 装备实例主键
  template_id: "template_001"    # 装备模板主键
  tenant_id: "default"           # 租户 ID
  auth:
    token: "changeme"            # 云端鉴权 Token
    cert_path: ""                # 证书路径（可选）
  mqtt:
    enabled: true
    broker_host: "localhost"
    broker_port: 1883
    keepalive: 60
    topic_prefix: "/oivs/{tenant_id}/{device_id}"
  websocket:
    enabled: false
    url: ""
  tcp:
    enabled: false
    host: ""
    port: 0
  udp:
    enabled: false
    host: ""
    port: 0
  lora:
    enabled: false
    serial_port: "/dev/ttyUSB0"
    baud_rate: 9600
  zigbee:
    enabled: false
    serial_port: "/dev/ttyUSB1"
    baud_rate: 115200
  bluetooth:
    enabled: false
  heartbeat_interval_ms: 5000
  ipv6_enabled: false
