uran_media:
  video_sources:
    - channel_id: "color"
      source_type: "ros_topic"
      ros_topic: "/camera/color/image_raw"
      msg_type: "sensor_msgs/Image"
      width: 640
      height: 480
      fps: 30

    - channel_id: "depth"
      source_type: "ros_topic"
      ros_topic: "/camera/depth/image_rect_raw"
      msg_type: "sensor_msgs/Image"
      width: 640
      height: 480
      fps: 30

    - channel_id: "infra1"
      source_type: "ros_topic"
      ros_topic: "/camera/infra1/image_rect_raw"
      msg_type: "sensor_msgs/Image"
      width: 640
      height: 480
      fps: 30

    - channel_id: "infra2"
      source_type: "ros_topic"
      ros_topic: "/camera/infra2/image_rect_raw"
      msg_type: "sensor_msgs/Image"
      width: 640
      height: 480
      fps: 30

    - channel_id: "aligned_depth"
      source_type: "ros_topic"
      ros_topic: "/camera/aligned_depth_to_color/image_raw"
      msg_type: "sensor_msgs/Image"
      width: 640
      height: 480
      fps: 30

  default_protocol: "webrtc"
  webrtc:
    stun_server: "stun:stun.l.google.com:19302"
    turn_servers: []
    max_reconnect_attempts: 3
  rtsp:
    port: 8554
    encoder_pipeline: "x264enc tune=zerolatency speed-preset=ultrafast key-int-max={fps}"
  local_record:
    enabled: false
    storage_path: "/tmp/uran_media_record"
    max_size_mb: 2048
    segment_duration_s: 60
