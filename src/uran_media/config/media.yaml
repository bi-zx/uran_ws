uran_media:
  video_sources:
    # 通用 ROS topic 模式
    - channel_id: "front_cam"
      source_type: "ros_topic"          # ros_topic | camera_service
      ros_topic: "/camera/image_raw"
      msg_type: "sensor_msgs/Image"
      encoding: "bgr8"
      fps: 30

    # CyberDog2 主 RGB 摄像头（通过 camera_service 激活）
    - channel_id: "cyberdog_main"
      source_type: "camera_service"
      camera_service_name: "camera_service"  # 节点会自动加 cyberdog_ns 前缀
      ros_topic: "image"
      msg_type: "sensor_msgs/Image"
      width: 1280
      height: 960
      fps: 10

    # RealSense 左目红外图像
    - channel_id: "realsense_left"
      source_type: "realsense_lifecycle"
      lifecycle_node: "/camera/camera"
      ros_topic: "/camera/infra1/image_rect_raw"
      msg_type: "sensor_msgs/Image"
      fps: 30

    # RealSense 右目红外图像
    - channel_id: "realsense_right"
      source_type: "realsense_lifecycle"
      lifecycle_node: "/camera/camera"
      ros_topic: "/camera/infra2/image_rect_raw"
      msg_type: "sensor_msgs/Image"
      fps: 30

    # RealSense 深度图
    - channel_id: "realsense_depth"
      source_type: "realsense_lifecycle"
      lifecycle_node: "/camera/camera"
      ros_topic: "/camera/depth/image_rect_raw"
      msg_type: "sensor_msgs/Image"
      fps: 30

    # RealSense 对齐深度图（对齐到红外1，无需额外节点）
    - channel_id: "realsense_aligned"
      source_type: "realsense_lifecycle"
      lifecycle_node: "/camera/camera"
      ros_topic: "/camera/aligned_depth_to_infra1/image_raw"
      msg_type: "sensor_msgs/Image"
      fps: 30

    # RealSense 对齐深度图（对齐到 RGB，需要 camera_align 节点）
    - channel_id: "realsense_aligned_rgb"
      source_type: "realsense_lifecycle"
      lifecycle_node: "/camera/camera"
      ros_topic: "/camera/aligned_depth_to_rgb/image_raw"
      msg_type: "sensor_msgs/Image"
      fps: 30

  # CyberDog2 命名空间前缀（ros2 node list 输出中 /mi_desktop_xxx/ 部分）
  # 留空则使用裸 topic 名（非 CyberDog2 环境）
  cyberdog_ns: "/mi_desktop_48_b0_2d_5f_b6_d0"

  default_protocol: "webrtc"
  webrtc:
    stun_server: "stun:stun.l.google.com:19302"
    max_reconnect_attempts: 3
  local_record:
    enabled: false
    storage_path: "/tmp/uran_media_record"
    max_size_mb: 2048
    segment_duration_s: 60
